          description: Time period labels (e.g., 'Mon', 'Week 1', 'Jan 2025')
          example:
          - Week 1
          - Week 2
          - Week 3
          - Week 4
        durations:
          items:
            type: integer
          type: array
          title: Durations
          description: All standard class durations in minutes (12, 30, 45, 60, 75, 90)
          example:
          - 12
          - 30
          - 45
          - 60
          - 75
          - 90
        duration_counts:
          additionalProperties:
            items:
              type: integer
            type: array
          type: object
          title: Duration Counts
          description: Count of classes per duration per period. Keys are duration strings (e.g., '30'), values are arrays
            of counts matching period_labels
          example:
            '12':
            - 0
            - 1
            - 0
            - 0
            '30':
            - 2
            - 1
            - 3
            - 1
            '60':
            - 1
            - 2
            - 1
            - 2
